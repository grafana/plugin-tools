name: Test docs build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-x64
    permissions:
      pull-requests: read
    outputs:
      docs: ${{ steps.filter.outputs.changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/paths-filter
        id: filter
        with:
          patterns: |
            .github/workflows/deploy-to-developer-portal-dev.yml
            .github/workflows/deploy-to-developer-portal-prod.yml
            .github/workflows/test-build.yml
            .github/actions/paths-filter/**
            docusaurus/**
            package-lock.json

  build-docs:
    needs: changes
    if: ${{ needs.changes.outputs.docs == 'true' }}
    runs-on: ubuntu-x64
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup nodejs
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
      - name: Build documentation website (Dev Portal)
        run: npm run build -w website
