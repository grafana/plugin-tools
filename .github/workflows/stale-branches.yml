name: Stale Branches

on:
  schedule:
    - cron: '0 11 * * 1-5'

permissions:
  issues: write
  contents: write

jobs:
  stale_branches:
    runs-on: ubuntu-x64
    steps:
    - name: Stale Branches
      uses: crs-k/stale-branches@e876b957ab08f0bad43c8cc271a22cdd7604bd09 # v9.0.1
      with:
        #dry-run: false
        pr-check: true
        ignore-issue-interaction: true
